<section id="sec-sanciones" class="card" style="display:none">
  <h2>Sanciones</h2>

  <div class="card" style="margin-bottom:10px">
    <h3>Apercibimientos</h3>
    <div class="form-row">
      <label>Desde <input type="date" id="aperc-desde"></label>
      <label>Hasta <input type="date" id="aperc-hasta"></label>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn" onclick="listarApercibimientos()">Buscar</button>
      <button class="btn btn-warn" onclick="limpiarAperc()">Limpiar</button>
    </div>
    <div id="aperc-res" class="alerta"></div>
    <div id="aperc-tabla-wrap" style="display:none;margin-top:8px">
      <table>
        <thead id="aperc-thead"><tr><th>Foto</th><th>Nombre</th><th>Fecha</th></tr></thead>
        <tbody id="aperc-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h3>Suspensiones activas</h3>
    <div id="susp-res" class="alerta"></div>
    <div id="susp-tabla-wrap" style="display:none;margin-top:8px">
      <table>
        <thead id="susp-thead"><tr><th>Foto</th><th>Nombre</th><th>Desde</th><th>Hasta</th></tr></thead>
        <tbody id="susp-tbody"></tbody>
      </table>
    </div>
  </div>
</section>
