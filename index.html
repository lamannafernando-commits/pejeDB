
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gestión de Ingreso — SAFE MODE</title>
<style>
:root{--dorado:#c8a84b;--borde:#2d6e2d;--txt:#f8fff8;--panel:#112411}
*{box-sizing:border-box}
body{margin:0;background:#0f1f0f;color:var(--txt);font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}
header{position:sticky;top:0;z-index:10;background:#0b1b0b;border-bottom:3px solid var(--dorado);padding:10px 14px}
h1{margin:0;font-size:1.1rem;color:var(--dorado)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.chip{border:1px solid var(--borde);border-radius:999px;padding:4px 10px;background:#0a140a}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid #555;margin-right:6px}
main{padding:14px}
.card{background:var(--panel);border:1px solid var(--borde);border-radius:10px;padding:12px;margin-bottom:14px}
.btn{cursor:pointer;border-radius:8px;border:1px solid #2f5f2f;background:#184718;color:#fff;padding:8px 12px}
.alerta{margin-top:8px;padding:8px 10px;border-radius:8px;border:1px solid #3a3a3a;background:#101010;color:#eee}
#float-token{position:fixed;right:12px;bottom:12px;z-index:9999;border:1px solid var(--dorado);background:#2a2a0a}
/* Debug */
#debug{position:fixed;left:12px;bottom:12px;background:#0b1b0b;color:#cfe9cf;border:1px solid #2d6e2d;border-radius:8px;padding:6px 8px;font-size:12px;z-index:9999;max-width:50vw}
#debug pre{white-space:pre-wrap;word-break:break-word;margin:6px 0 0 0}
</style>
</head>
<body>
<header>
  <h1>Gestión de Ingreso — SAFE MODE</h1>
  <div class="row">
    <div class="chip" id="reloj">--:--:-- — --/--/----</div>
    <div class="chip" id="sync-badge">☁️ Modo local</div>
    <div class="chip">🛡️ Safe: sin overlay/bloqueos</div>
  </div>
</header>

<main>
  <section class="card">
    <h2>Prueba de reloj</h2>
    <div class="alerta">Si esta hora no cambia, tu entorno no está ejecutando JavaScript.</div>
  </section>
  <section class="card">
    <h2>Ingreso (demo mínimo)</h2>
    <button class="btn" onclick="alert('UI habilitada. Este modo es solo prueba visual.')">Probar botón</button>
  </section>
</main>

<!-- Modal Token simple -->
<div id="token-modal" style="display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(0,0,0,.55)">
  <div style="background:#0c1c0c;border:1px solid var(--dorado);border-radius:12px;padding:16px;max-width:520px;width:calc(100% - 32px)">
    <h3>Configurar Token de GitHub</h3>
    <div class="row" style="gap:12px;flex-wrap:wrap">
      <label style="flex:1;min-width:220px">Token
        <input type="text" id="token-input" style="width:100%;padding:8px;border-radius:8px;border:1px solid #365e36;background:#0a1a0a;color:var(--txt)" placeholder="ghp_...">
      </label>
      <label style="flex:1;min-width:220px">Repo (owner/repo)
        <input type="text" id="repo-input" style="width:100%;padding:8px;border-radius:8px;border:1px solid #365e36;background:#0a1a0a;color:var(--txt)" placeholder="owner/repo">
      </label>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="btn" onclick="guardarTokenSafe()">Guardar</button>
      <button class="btn" onclick="cerrarTokenSafe()">Cerrar</button>
    </div>
  </div>
</div>

<button id="float-token" class="btn" onclick="abrirTokenSafe()">🔑 Configurar token</button>

<div id="debug">Estado: <span id="dbg-online">?</span> · Token: <span id="dbg-token">?</span>
  <pre id="dbg-log"></pre>
</div>

<script>
(function(){
  function dos(n){return n<10?('0'+n):(''+n)}
  function tick(){
    try{
      const d=new Date();
      document.getElementById('reloj').textContent=`${dos(d.getHours())}:${dos(d.getMinutes())}:${dos(d.getSeconds())} — ${dos(d.getDate())}/${dos(d.getMonth()+1)}/${d.getFullYear()}`;
    }catch(e){}
  }
  tick(); setInterval(tick,1000);

  // Debug online/token
  function upd(){
    try{ document.getElementById('dbg-online').textContent = (navigator.onLine?'online':'offline'); }catch(e){}
    try{ document.getElementById('dbg-token').textContent = localStorage.getItem('app_token')? 'presente':'faltante'; }catch(e){}
  }
  upd(); window.addEventListener('online',upd); window.addEventListener('offline',upd);

  // Token modal helpers
  window.abrirTokenSafe = function(){ document.getElementById('token-modal').style.display='flex';
    try{document.getElementById('token-input').value=localStorage.getItem('app_token')||'';}catch(e){}
    try{document.getElementById('repo-input').value=localStorage.getItem('app_repo')||'';}catch(e){}
  }
  window.cerrarTokenSafe = function(){ document.getElementById('token-modal').style.display='none'; }
  window.guardarTokenSafe = function(){
    try{
      const t=document.getElementById('token-input').value.trim();
      const r=document.getElementById('repo-input').value.trim();
      if(!t||!r){ alert('Completá Token y Repo'); return; }
      localStorage.setItem('app_token', t);
      localStorage.setItem('app_repo', r);
      document.getElementById('dbg-token').textContent='presente';
      document.getElementById('dbg-log').textContent='Token guardado en localStorage. (Validación real deshabilitada en SAFE MODE)';
      cerrarTokenSafe();
    }catch(e){ document.getElementById('dbg-log').textContent='Error guardando token: '+e; }
  }

  // Error catcher
  window.addEventListener('error', function(e){
    try{ document.getElementById('dbg-log').textContent = 'Error JS: '+ (e.message||e); }catch(_){}
  });
})();
</script>
<noscript><div class="alerta" style="margin:12px">⚠️ Tu navegador tiene JavaScript deshabilitado. Activalo para continuar.</div></noscript>
</body>
</html>
