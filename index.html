
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Consulta — Grid mínima</title>
<style>
 body{font-family:system-ui;margin:0;padding:16px;background:#0f1f0f;color:#f8fff8}
 table{width:100%;border-collapse:collapse;margin-top:10px}
 th,td{padding:6px 8px;border-bottom:1px solid #2d6e2d}
 .thumb{width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #c8a84b;cursor:zoom-in;background:#000}
 #img-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:1000}
 #img-modal img{max-width:90vw;max-height:90vh;border:3px solid #c8a84b;border-radius:10px}
 input[type=date],input[type=text]{background:#0a1a0a;color:#f8fff8;border:1px solid #2d6e2d;border-radius:8px;padding:6px}
 .btn{background:#184718;border:1px solid #2f5f2f;color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer}
 .alerta{margin-top:8px;padding:8px 10px;border-radius:8px;border:1px solid #3a3a3a;background:#101010;color:#eee}
 .ok{background:#0f2a0f;border-color:#2d7a2d}
 .warn{background:#2a1a0a;border-color:#b06f18}
 .error{background:#2a0f0f;border-color:#b03b3b}
</style>
</head>
<body>
<h1>Consulta — Grid mínima</h1>
<div>
  <label>Identificador (opcional) <input type="text" id="consulta-id"></label>
  <label>Desde <input type="date" id="consulta-desde"></label>
  <label>Hasta <input type="date" id="consulta-hasta"></label>
  <button class="btn" onclick="consulta()">Buscar</button>
</div>
<div id="consulta-res" class="alerta"></div>
<table id="consulta-tabla">
  <thead><tr><th>Foto</th><th>Invitado/Socio</th><th>DNI/N° socio</th><th>Fecha ingreso</th></tr></thead>
  <tbody></tbody>
</table>
<div id="img-modal" onclick="this.style.display='none'"><img id="img-modal-img" alt="Foto"></div>
<script>
const KEYS={ingresos:'app_ingresos',fotos:'app_fotos'};
function cargarDatos(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch{return []}}
function getFotosMap(){try{return JSON.parse(localStorage.getItem(KEYS.fotos)||'{}')}catch{return {}}}
function getFoto(id){const m=getFotosMap();return m[id]||''}
function toISO(fecha){ if(!fecha) return "0001-01-01"; if(/^\d{4}-\d{2}-\d{2}$/.test(fecha)) return fecha; const p=fecha.split("/"); if(p.length!==3) return "0001-01-01"; const dd=+p[0],mm=+p[1],yyyy=+p[2]; const d=new Date(yyyy,mm-1,dd); return d.toISOString().slice(0,10); }
function abrirImgModal(src){const m=document.getElementById('img-modal');const i=document.getElementById('img-modal-img');i.src=src;m.style.display='flex'}
function consulta(){
  const id=(document.getElementById('consulta-id').value||'').trim();
  const desdeISO=(document.getElementById('consulta-desde').value||'').trim();
  const hastaISO=(document.getElementById('consulta-hasta').value||'').trim();
  const res=document.getElementById('consulta-res');
  const tbody=document.querySelector('#consulta-tabla tbody');
  res.className='alerta'; res.innerHTML=''; tbody.innerHTML='';
  const ing=cargarDatos(KEYS.ingresos);
  let isoDesde = desdeISO || null; let isoHasta = hastaISO || null;
  if(isoDesde && !/^\d{4}-\d{2}-\d{2}$/.test(isoDesde)){ res.classList.add('error'); res.innerHTML='❌ Fecha "Desde" inválida.'; return; }
  if(isoHasta && !/^\d{4}-\d{2}-\d{2}$/.test(hastaISO)){ res.classList.add('error'); res.innerHTML='❌ Fecha "Hasta" inválida.'; return; }
  if(isoDesde && !isoHasta) isoHasta='9999-12-31';
  if(!isoDesde && isoHasta) isoDesde='0001-01-01';
  let filas = ing.filter(x=>{ const okId = id? x.dni===id : true; const f = x.isoFecha || toISO(x.fecha); const okFecha = (isoDesde? f>=isoDesde : true) && (isoHasta? f<=isoHasta : true); return okId && okFecha; });
  filas.sort((a,b)=>{ const ka=(a.isoFecha||toISO(a.fecha))+' '+(a.hora||'00:00:00'); const kb=(b.isoFecha||toISO(b.fecha))+' '+(b.hora||'00:00:00'); return kb.localeCompare(ka); });
  if(!filas.length){ res.classList.add('warn'); res.innerHTML='😕 Sin registros para los filtros aplicados.'; return; }
  filas.forEach(x=>{ const tr=document.createElement('tr'); const foto=getFoto(x.dni); const tipo=(x.tipo||'').toLowerCase()==='socio'?'Socio':'Invitado';
    tr.innerHTML = `<td>${foto?`<img class="thumb" src="${foto}" alt="Foto" onclick="abrirImgModal('${foto.replace(/'/g,'&#39;')}')">`:'—'}</td>`+
                    `<td>${tipo}</td>`+
                    `<td>${x.dni}</td>`+
                    `<td>${x.fecha||'—'}</td>`;
    tbody.appendChild(tr);
  });
  res.classList.add('ok'); res.innerHTML=`✅ ${filas.length} registro(s) encontrado(s).` + (id? ` ID: <strong>${id}</strong>.`: '');
}
</script>
</body>
</html>
