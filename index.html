<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>PCQ – Gestión de Inspectores (v13.0.0)</title>

  <!-- Ocultar cualquier badge/estado de token en el header -->
  <style id="pcq-hide-token-badge">#sync-badge{display:none!important}</style>

  <style>
    :root{
      --c-bg:#0f172a;      /* slate-900 */
      --c-card:#111827;    /* gray-900  */
      --c-txt:#e5e7eb;     /* gray-200  */
      --c-sub:#9ca3af;     /* gray-400  */
      --c-acc:#22c55e;     /* green-500 */
      --c-warn:#f59e0b;    /* amber-500 */
      --c-err:#ef4444;     /* red-500   */
      --c-line:#1f2937;    /* gray-800  */
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--c-bg);color:var(--c-txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue","Noto Sans",Arial,"Apple Color Emoji","Segoe UI Emoji"}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--c-line);position:sticky;top:0;background:var(--c-bg);z-index:5}
    header h1{margin:0;font-size:18px;font-weight:600}
    nav{display:flex;gap:8px;flex-wrap:wrap}
    nav button{
      appearance:none;border:1px solid var(--c-line);background:#0b1220;color:var(--c-txt);
      padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600;letter-spacing:.2px;
    }
    nav button:hover{border-color:#334155}
    nav button.activo{outline:2px solid var(--c-acc); outline-offset:1px}
    nav button.nav-bloqueado{opacity:.35;pointer-events:none}
    main{max-width:1100px;margin:16px auto;padding:0 12px}
    .seccion{display:none}
    .card{background:var(--c-card); border:1px solid var(--c-line); border-radius:12px; padding:16px;margin:12px 0}
    h2{margin:0 0 12px 0; font-size:18px}
    h3{margin:10px 0 8px 0; font-size:16px; color:var(--c-sub)}
    .form-row{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0}
    .form-row label{display:flex;flex-direction:column;gap:6px;min-width:220px;flex:1}
    input, select{background:#0b1220;border:1px solid var(--c-line); color:var(--c-txt); border-radius:8px; padding:10px}
    .btn{appearance:none;border:1px solid var(--c-line);background:#0b1220;color:var(--c-txt);padding:10px 12px;border-radius:8px;cursor:pointer}
    .btn-success{background:#0b1220;border-color:#14532d}
    .btn-warning{border-color:#854d0e}
    .btn-danger{border-color:#7f1d1d}
    .btn-gold{border-color:#ca8a04}
    table{width:100%;border-collapse:collapse;margin-top:6px}
    thead th{font-weight:700;color:var(--c-sub);text-align:left;border-bottom:1px solid var(--c-line);padding:8px}
    tbody td{border-bottom:1px solid var(--c-line);padding:8px}
    .alerta{display:none;margin-top:8px;padding:8px;border-radius:8px;border:1px solid var(--c-line);color:var(--c-sub)}
    .alerta.show{display:block}
    .alerta-ok{border-color:#14532d;color:#a7f3d0}
    .alerta-error{border-color:#7f1d1d;color:#fecaca}
    .muted{color:var(--c-sub)}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:20}
    .modal-overlay.show{display:flex}
    .modal-box{width:min(680px,90vw); background:var(--c-card); border:1px solid var(--c-line); border-radius:12px; padding:16px}
    .modal-acciones{display:flex;gap:12px; justify-content:flex-end; margin-top:12px}
  </style>
</head>
<body>

<header>
  <h1>PCQ · Gestión de Inspectores</h1>
  <nav>
    <button id="btn-nav-inspectores" class="activo">📋 Inspectores</button>
    <button id="btn-nav-backup">⚙️ Administrar</button>
  </nav>
</header>

<main>
  <!-- Inspectores: SOLO listado -->
  <section id="sec-inspectores" class="seccion" style="display:block">
    <div class="card" id="card-insp-listado">
      <h2>📋 Inspectores Registrados</h2>
      <div class="lista-inspectores" id="lista-inspectores"></div>
    </div>
  </section>

  <!-- Administrar: ABM completo (solo acá) -->
  <section id="sec-backup" class="seccion">
    <div class="card" id="card-admin-abm-insp">
      <h2>⚙️ Gestión de Inspectores</h2>

      <div class="form-row">
        <label>Apellido y Nombre
          <input type="text" id="adm-insp-nombre" placeholder="Apellido, Nombre"/>
        </label>
        <label>Teléfono (opcional)
          <input type="text" id="adm-insp-tel" placeholder="Ej: 11-1234-5678" maxlength="30"/>
        </label>
      </div>

      <div class="form-row">
        <label>Usuario
          <input type="text" id="adm-insp-user" placeholder="usuario.login"/>
        </label>
        <label>Contraseña
          <input type="password" id="adm-insp-pass" placeholder="********"/>
        </label>
      </div>

      <div class="form-row">
        <label>Observaciones (opcional)
          <input type="text" id="adm-insp-obs" placeholder="Turno, área, etc." maxlength="80"/>
        </label>
      </div>

      <div class="form-row">
        <button class="btn btn-success" id="adm-insp-crear">➕ Dar de alta</button>
        <div id="adm-insp-alerta" class="alerta"></div>
      </div>

      <hr/>
      <h3>Listado y acciones</h3>
      <div id="adm-insp-list"></div>
    </div>
  </section>
</main>

<!-- Modal PASS MAESTRA -->
<div class="modal-overlay" id="modal-pass">
  <div class="modal-box">
    <h3 id="pass-titulo">🔒 Confirmación requerida</h3>
    <p id="pass-subtitulo" class="muted">Ingresá la contraseña maestra para continuar.</p>
    <div class="form-row">
      <label>Contraseña maestra
        <input type="password" id="pass-input" placeholder="••••••••"/>
      </label>
    </div>
    <div id="alerta-pass" class="alerta"></div>
    <div class="modal-acciones">
      <button class="btn btn-secondary" id="pass-cancelar">✖ Cancelar</button>
      <button class="btn btn-gold" id="pass-confirmar">✅ Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal EDICIÓN -->
<div class="modal-overlay" id="modal-admin-edit-insp">
  <div class="modal-box">
    <h3>✏️ Editar inspector</h3>
    <div class="form-row">
      <label>Apellido y Nombre
        <input type="text" id="edit-insp-nombre"/>
      </label>
      <label>Teléfono (opcional)
        <input type="text" id="edit-insp-tel"/>
      </label>
    </div>
    <div class="form-row">
      <label>Usuario
        <input type="text" id="edit-insp-user"/>
      </label>
      <label>Contraseña
        <input type="password" id="edit-insp-pass"/>
      </label>
    </div>
    <div class="form-row">
      <label>Observaciones
        <input type="text" id="edit-insp-obs"/>
      </label>
    </div>
    <div id="alerta-admin-edit" class="alerta"></div>
    <div class="modal-acciones">
      <button class="btn btn-secondary" id="btn-edit-cancelar">✖ Cancelar</button>
      <button class="btn btn-gold" id="btn-edit-guardar">💾 Guardar cambios</button>
    </div>
  </div>
</div>

<script>
/***********************  CONFIG / UTILIDADES  ************************/  
const ENFORCE_ACTIVE_GATE = true; // Si querés desactivar el gating por “inspector activo”, poné false.

function $(id){ return document.getElementById(id); }
function qsa(sel,root){ return Array.from((root||document).querySelectorAll(sel)); }
function keyInspectores(){ return (window.KEYS && KEYS.inspectores) ? KEYS.inspectores : 'pcq_inspectores'; }
function loadInspectores(){ try{ return JSON.parse(localStorage.getItem(keyInspectores())||'[]'); }catch(_){ return []; } }
function saveInspectores(lst){ try{ localStorage.setItem(keyInspectores(), JSON.stringify(lst)); }catch(_){ } }

/* Tiempo local (sin red) si hubiera UI de reloj */
window.sincronizarHora = async function(){ try{ const f=document.getElementById('fuente-hora'); if(f) f.textContent='🕐 Hora local del dispositivo'; }catch(_){} };

/* Inspector activo (opcional) */
function getInspectorActivo(){
  try{ if(typeof window._getInspectorActivo==='function') return window._getInspectorActivo(); }catch(_){}
  try{ if(typeof window.getInspectorActivo==='function' && window.getInspectorActivo!==getInspectorActivo) return window.getInspectorActivo(); }catch(_){}
  try{ const raw=localStorage.getItem('pcq_insp_activo')||localStorage.getItem('insp_activo_id'); if(raw){ const id=parseInt(raw,10); const arr=loadInspectores(); return arr.find(x=>x.id===id)||null; } }catch(_){}
  return null;
}

/* SHA-256 + fallback */
async function sha256Hex(str){ const enc=new TextEncoder().encode(str); const buf=await crypto.subtle.digest('SHA-256', enc); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function sha256HexFallback(ascii){
  function R(v,a){return (v>>>a)|(v<<(32-a));}
  const M=Math.pow(2,32); let r='',w=[],i,j,L=ascii.length*8,h=sha256HexFallback.h=sha256HexFallback.h||[],k=sha256HexFallback.k=sha256HexFallback.k||[],p=k.length,c={};
  function f(x){return x-Math.floor(x)}
  if(!p){ for(let q=2;p<64;q++) if(!c[q]){ for(i=0;i<313;i+=q)c[i]=q; h[p]=(f(Math.sqrt(q))*M)|0; k[p++]=(f(Math.cbrt(q))*M)|0 } }
  ascii+='\u0080'; while(ascii.length%64-56) ascii+='\u0000';
  for(i=0;i<ascii.length;i++){ j=ascii.charCodeAt(i); w[i>>2]|=j<<((3-i)%4)*8 }
  w[w.length]=(L/M)|0; w[w.length]=L;
  for(j=0;j<w.length;){ let W=w.slice(j,j+=16),H=h.slice(0),a=h[0],b=h[1],c2=h[2],d=h[3],e=h[4],f2=h[5],g=h[6],h2=h[7];
    for(i=0;i<64;i++){
      let w15=W[i-15],w2=W[i-2],s0=(w15>>>7 ^ w15>>>18 ^ w15>>>3),s1=(w2>>>17 ^ w2>>>19 ^ w2>>>10);
      W[i]=i<16?W[i]:(W[i-16]+s0+W[i-7]+s1)|0;
      let ch=e&f2 ^ ~e&g,maj=a&b ^ a&c2 ^ b&c2,S0=(a>>>2 ^ a>>>13 ^ a>>>22),S1=(e>>>6 ^ e>>>11 ^ e>>>25);
      let t1=(h2+S1+ch+k[i]+W[i])|0,t2=(S0+maj)|0; h2=g; g=f2; f2=e; e=(d+t1)|0; d=c2; c2=b; b=a; a=(t1+t2)|0
    }
    h[0]=(h[0]+a)|0; h[1]=(h[1]+b)|0; h[2]=(h[2]+c2)|0; h[3]=(h[3]+d)|0; h[4]=(h[4]+e)|0; h[5]=(h[5]+f2)|0; h[6]=(h[6]+g)|0; h[7]=(h[7]+h2)|0;
  }
  for(i=0;i<h.length;i++) for(j=3;j+1;j--){ let B=(h[i]>>> (j*8))&255; r+=((B<16)?'0':'')+B.toString(16) }
  return r;
}
async function sha256HexSafe(s){ try{ if(window.crypto&&crypto.subtle){ return await sha256Hex(s);} }catch(_){ } return sha256HexFallback(s); }

/* Pass maestra smart: BACKUP_PASS / BACKUP_PASS_HASH, compat "gustavopeje" */
async function checkMasterPassSmart(input){
  try{ if(typeof window.BACKUP_PASS!=='undefined' && window.BACKUP_PASS!==null){ if(String(input)===String(window.BACKUP_PASS)) return true; } }catch(_){}
  try{ if(typeof window.BACKUP_PASS_HASH!=='undefined' && window.BACKUP_PASS_HASH){ const h=await sha256HexSafe(String(input)); if(h===String(window.BACKUP_PASS_HASH)) return true; } }catch(_){}
  try{ if(String(input)==='gustavopeje') return true; }catch(_){}
  return false;
}

/***********************  RENDER: INSPECTORES  ************************/
function renderInspectoresFallback(){
  let cont = $('lista-inspectores');
  if(!cont){ const sec=$('sec-inspectores'); if(sec){ const card=sec.querySelector('.card')||sec; cont=document.createElement('div'); cont.id='lista-inspectores'; cont.className='lista-inspectores'; card.appendChild(cont);} }
  if(!cont) return;
  const data = loadInspectores();
  if(!Array.isArray(data) || data.length===0){ cont.innerHTML='<p class="muted">No hay inspectores registrados.</p>'; return; }
  let html = `\n<table class="tabla" id="tabla-inspectores"><thead><tr><th>Nombre</th><th>Teléfono</th><th>Usuario</th><th>Obs.</th></tr></thead><tbody>`;
  data.forEach(i=>{ html += `<tr><td>${i.nombre||''}</td><td>${i.tel||''}</td><td>${i.usuario||''}</td><td>${i.obs||''}</td></tr>`; });
  html += `</tbody></table>`;
  cont.innerHTML = html;
}
const _origRenderInspectores = window.renderInspectores;
window.renderInspectores = function(){ try{ if(typeof _origRenderInspectores==='function'){ _origRenderInspectores(); return; } }catch(_){ } renderInspectoresFallback(); };

/***********************  RENDER: ADMIN  ************************/
window.renderAdminLista = window.renderAdminLista || function(){
  const cont = document.getElementById('adm-insp-list'); if(!cont) return;
  const data = loadInspectores();
  if(!Array.isArray(data) || data.length===0){ cont.innerHTML='<p class="muted">No hay inspectores registrados.</p>'; return; }
  let html = `\n<table class="tabla" id="tabla-admin-inspectores">\n<thead><tr><th>Nombre</th><th>Teléfono</th><th>Usuario</th><th>Obs.</th><th style="width:140px">Acciones</th></tr></thead><tbody>`;
  data.forEach(i=>{
    html += `<tr>
      <td>${i.nombre||''}</td>
      <td>${i.tel||''}</td>
      <td>${i.usuario||''}</td>
      <td>${i.obs||''}</td>
      <td>
        <button class="btn btn-warning" onclick="adminAbrirEditarInspector(${i.id})">✏️ Editar</button>
        <button class="btn btn-danger" onclick="adminSolicitarEliminarInspector(${i.id})">🗑️ Eliminar</button>
      </td>
    </tr>`;
  });
  html += `</tbody></table>`;
  cont.innerHTML = html;
};

/***********************  NAVEGACIÓN ROBUSTA  ************************/
function showSection(id){
  try{
    qsa('section[id^="sec-"]').forEach(sec=>{ sec.style.display = (sec.id==='sec-'+id)?'block':'none'; });
    qsa('nav button').forEach(b=>b.classList.remove('activo'));
    const btn = $('btn-nav-'+id); if(btn) btn.classList.add('activo');
    location.hash = '#'+id;
    if(id==='inspectores') window.renderInspectores();
    if(id==='backup') window.renderAdminLista();
  }catch(_){ }
}
window._navegarSeccion = showSection;
window.navClick = function(id, btn){ try{ showSection(id); }catch(_){ location.hash='#'+id; } };

/* Wiring inicial */
document.addEventListener('DOMContentLoaded', ()=>{
  qsa('nav button[id^="btn-nav-"]').forEach(b=>{ const id=b.id.replace('btn-nav-',''); b.addEventListener('click', ev=>{ ev.preventDefault(); window.navClick(id, b); }); });
  try{ const admin=$('btn-nav-backup'); if(admin){ admin.textContent='⚙️ Administrar'; admin.addEventListener('click', ev=>{ ev.preventDefault(); window.navClick('backup', admin); }); } }catch(_){}
  const wanted=(location.hash||'').replace('#','') || 'inspectores';
  showSection(wanted);
  setTimeout(()=>{ try{ if(wanted==='inspectores') window.renderInspectores(); else if(wanted==='backup') window.renderAdminLista(); }catch(_){ } }, 150);
});
window.addEventListener('hashchange', ()=>{ const id=(location.hash||'').replace('#','')||'inspectores'; showSection(id); });

/***********************  GATING por “Inspector Activo”  ************************/
function applyActiveGate(){
  if(!ENFORCE_ACTIVE_GATE) return;
  const activo = !!getInspectorActivo();
  const buttons = qsa('nav button');
  if(!activo){
    // Habilitar solo Inspectores; ocultar otras secciones
    buttons.forEach(btn=>{ if((btn.id||'')==='btn-nav-inspectores') btn.classList.remove('nav-bloqueado'); else btn.classList.add('nav-bloqueado'); });
    qsa('section[id^="sec-"]').forEach(sec=>{ sec.style.display = (sec.id==='sec-inspectores') ? 'block':'none'; });
    if(location.hash !== '#inspectores') showSection('inspectores');
  }else{
    buttons.forEach(btn=>btn.classList.remove('nav-bloqueado'));
  }
}
document.addEventListener('DOMContentLoaded', ()=> setTimeout(applyActiveGate, 220));
window.addEventListener('hashchange', applyActiveGate);

/***********************  ABM EN “ADMINISTRAR” (con pass maestra)  ************************/
function setAlerta(id, tipo, msg){ const el=$(id); if(!el) return; el.className='alerta show '+(tipo==='ok'?'alerta-ok':tipo==='error'?'alerta-error':''); el.textContent=msg||''; }
function abrirModalPass(titulo, subtitulo, accion){ try{ const tit=$('pass-titulo'); if(tit) tit.textContent=titulo||'🔒 Confirmación requerida'; const sub=$('pass-subtitulo'); if(sub) sub.textContent=subtitulo||'Ingresá la contraseña maestra para continuar.'; const a=$('alerta-pass'); if(a){ a.className='alerta'; a.textContent=''; } $('pass-input').value=''; window._pendingPassAction=accion||null; $('modal-pass').classList.add('show'); setTimeout(()=>{ try{ $('pass-input').focus(); }catch(_){} },80);}catch(_){} }
function cerrarModalPass(){ try{ $('modal-pass').classList.remove('show'); }catch(_){} }

/* Alta */
$('adm-insp-crear').addEventListener('click', (ev)=>{
  ev.preventDefault();
  const nombre=($('adm-insp-nombre')||{}).value?.trim()||'';
  const tel   =($('adm-insp-tel')||{}).value?.trim()||'';
  const user  =($('adm-insp-user')||{}).value?.trim()||'';
  const pass  =($('adm-insp-pass')||{}).value||'';
  const obs   =($('adm-insp-obs')||{}).value?.trim()||'';
  if(!nombre||!user||!pass){ setAlerta('adm-insp-alerta','error','Completá Nombre, Usuario y Contraseña.'); return; }
  window._pendingInspectorAlta={ nombre, tel, usuario:user, pass, obs };
  abrirModalPass('🔒 Confirmá el alta del inspector','Ingresá la contraseña maestra para dar de alta el inspector.','alta-inspector');
});

/* Editar */
window.adminAbrirEditarInspector = function(id){
  const list=loadInspectores(); const it=list.find(x=>x.id===id); if(!it) return;
  $('edit-insp-nombre').value=it.nombre||''; $('edit-insp-tel').value=it.tel||'';
  $('edit-insp-user').value=it.usuario||''; $('edit-insp-pass').value=it.pass||'';
  $('edit-insp-obs').value=it.obs||'';
  $('alerta-admin-edit').className='alerta'; $('alerta-admin-edit').textContent='';
  $('modal-admin-edit-insp').classList.add('show');
  window._editId = id;
};
$('btn-edit-cancelar').addEventListener('click', ()=>{ $('modal-admin-edit-insp').classList.remove('show'); });
$('btn-edit-guardar').addEventListener('click', ()=>{
  const nombre=($('edit-insp-nombre')||{}).value?.trim()||'';
  const tel   =($('edit-insp-tel')||{}).value?.trim()||'';
  const user  =($('edit-insp-user')||{}).value?.trim()||'';
  const pass  =($('edit-insp-pass')||{}).value||'';
  const obs   =($('edit-insp-obs')||{}).value?.trim()||'';
  if(!nombre||!user){ const a=$('alerta-admin-edit'); a.className='alerta show alerta-error'; a.textContent='Completá Nombre y Usuario.'; return; }
  window._pendingEditInspector = { id:window._editId, nombre, tel, usuario:user, pass, obs };
  abrirModalPass('🔒 Guardar cambios del inspector','Ingresá la contraseña maestra para confirmar.','editar-inspector');
});

/* Eliminar */
window.adminSolicitarEliminarInspector = function(id){ window._pendingDeleteInspectorId = id; abrirModalPass('🔒 Eliminar inspector','Ingresá la contraseña maestra para confirmar la eliminación.','eliminar-inspector'); };

/* Confirmar / Cancelar PASS */
$('pass-confirmar').addEventListener('click', async ()=>{
  const acc = window._pendingPassAction; const val = ($('pass-input')||{}).value||''; const ok = await checkMasterPassSmart(val);
  if(!ok){ setAlerta('alerta-pass','error','❌ Contraseña incorrecta.'); $('pass-input').value=''; $('pass-input').focus(); return; }

  if(acc==='alta-inspector' && window._pendingInspectorAlta){
    const e = window._pendingInspectorAlta; let list=loadInspectores(); if(!Array.isArray(list)) list=[];
    if(list.find(i=> (i.nombre||'').toLowerCase()===e.nombre.toLowerCase())){ setAlerta('adm-insp-alerta','error','Ya existe un inspector con ese nombre.'); return; }
    if(e.usuario && list.find(i=> (i.usuario||'').toLowerCase()===e.usuario.toLowerCase())){ setAlerta('adm-insp-alerta','error','Ya existe un inspector con ese usuario.'); return; }
    const reg = { id:Date.now(), nombre:e.nombre, tel:e.tel, usuario:e.usuario, pass:e.pass, obs:e.obs };
    list.push(reg); saveInspectores(list);
    ['adm-insp-nombre','adm-insp-tel','adm-insp-user','adm-insp-pass','adm-insp-obs'].forEach(id=>{ const el=$(id); if(el) el.value=''; });
    try{ window.renderAdminLista(); }catch(_){}
    try{ window.renderInspectores(); }catch(_){}
    setAlerta('adm-insp-alerta','ok','✅ Inspector dado de alta.');
    window._pendingInspectorAlta=null;
  }

  if(acc==='editar-inspector' && window._pendingEditInspector){
    const e=window._pendingEditInspector; let list=loadInspectores(); const idx=list.findIndex(i=>i.id===e.id);
    if(idx>-1){
      if(list.find((it,ix)=> ix!==idx && (it.nombre||'').toLowerCase()===e.nombre.toLowerCase())){ setAlerta('alerta-admin-edit','error','Ya existe un inspector con ese nombre.'); return; }
      if(e.usuario && list.find((it,ix)=> ix!==idx && (it.usuario||'').toLowerCase()===e.usuario.toLowerCase())){ setAlerta('alerta-admin-edit','error','Ya existe un inspector con ese usuario.'); return; }
      list[idx] = { ...list[idx], nombre:e.nombre, tel:e.tel, usuario:e.usuario, pass:e.pass, obs:e.obs }; saveInspectores(list);
    }
    try{ $('modal-admin-edit-insp').classList.remove('show'); }catch(_){}
    try{ window.renderAdminLista(); }catch(_){}
    try{ window.renderInspectores(); }catch(_){}
    window._pendingEditInspector=null;
  }

  if(acc==='eliminar-inspector' && window._pendingDeleteInspectorId!=null){
    let list=loadInspectores(); const idx=list.findIndex(i=>i.id===window._pendingDeleteInspectorId); if(idx>-1){ list.splice(idx,1); saveInspectores(list); }
    try{ window.renderAdminLista(); }catch(_){}
    try{ window.renderInspectores(); }catch(_){}
    window._pendingDeleteInspectorId=null;
  }

  cerrarModalPass(); window._pendingPassAction=null;
});
$('pass-cancelar').addEventListener('click', ()=>{ window._pendingPassAction=null; cerrarModalPass(); });

</script>
