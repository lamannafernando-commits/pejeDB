<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pejerrey Club Quilmes — Sistema</title>
  <style>
    body{margin:0;font-family:Arial, system-ui, -apple-system, Segoe UI, Roboto;background:#111;color:#eee}
    header{padding:12px;background:#0c1c0c;border-bottom:3px solid #c8a84b;position:sticky;top:0;z-index:10}
    h1{margin:0;color:#c8a84b;font-size:1.2rem}
    .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .chip{padding:6px 12px;border-radius:20px;background:#222;border:1px solid #555}
    .btn{background:#225122;color:white;padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    .btn-warn{background:#8a5a0d}
    nav{display:flex;gap:8px;padding:8px;background:#0e1e0e;border-bottom:2px solid #c8a84b}
    nav button{background:#1b331b;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
    nav button.act{border:2px solid #c8a84b}
    .card{background:#0f1f0f;border:1px solid #244;padding:14px;margin:14px;border-radius:8px}
    .form-row{display:flex;gap:12px;flex-wrap:wrap}
    input,select{background:#111;border:1px solid #355;padding:8px;border-radius:6px;color:white}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
    .modal-box{background:#0c1c0c;padding:20px;border-radius:10px;border:2px solid #c8a84b;width:90%;max-width:420px}
    .muted{opacity:.8}
  </style>
</head>
<body>
<header>
  <h1>Pejerrey Club Quilmes — Sistema</h1>
  <div class="row" style="margin-top:8px">
    <div id="reloj" class="chip">--:--:--</div>
    <div id="sync-badge" class="chip" title="Estado de conexión">Desconectado</div>
    <button id="btn-reconectar" class="btn" style="display:none" title="Forzar reconexión">↻ Reconectar</button>
    <div style="flex:1"></div>
    <button class="btn btn-warn" onclick="abrirModal()">⚡ Activar sistema</button>
  </div>
</header>
<nav>
  <button class="act" onclick="mostrar('ingreso', this)">Ingreso</button>
  <button onclick="mostrar('consulta', this)">Consulta</button>
</nav>
<main>
  <section id="ingreso" class="card">
    <h2>Ingreso</h2>
    <input placeholder="DNI">
  </section>
  <section id="consulta" class="card" style="display:none">
    <h2>Consulta</h2>
    <input placeholder="Buscar...">
  </section>
</main>
<!-- ==== MODAL SIMPLE ==== -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Activar sistema</h3>
    <p class="muted">Pegá tu token si corresponde. Se guarda en este dispositivo.</p>
    <input id="token" type="password" placeholder="Token opcional">
    <div style="margin-top:12px;display:flex;gap:10px">
      <button class="btn" onclick="guardar()">Guardar</button>
      <button class="btn btn-warn" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>
<script>
/* ======== RELOJ ======== */
setInterval(() => {
  document.getElementById("reloj").textContent = new Date().toLocaleTimeString();
}, 1000);

/* ======== ESTADO / CONEXIÓN ======== */
const badge = document.getElementById('sync-badge');
const btnReconectar = document.getElementById('btn-reconectar');
const LS_TOKEN_KEY = 'pcq_token_v1';
const ENDPOINT_PING = '/api/ping'; // Cambiá si tu backend usa otra ruta
let retry = 0;
let retryTimer = null;

function setBadge(text, color = '#222', border = '#555'){
  badge.textContent = text;
  badge.style.background = color;
  badge.style.borderColor = border;
}

function estadoLocalActivado(){
  return !!localStorage.getItem(LS_TOKEN_KEY);
}

function actualizarBadgeInicial(){
  if(navigator.onLine){
    setBadge('En línea (verificando...)', '#163216', '#2e7d32');
  } else {
    setBadge(estadoLocalActivado() ? 'Local activado (sin conexión)' : 'Desconectado', '#3a1a1a', '#b71c1c');
  }
}

async function ping(){
  // Verifica backend y credenciales si existieran
  const headers = {};
  const token = localStorage.getItem(LS_TOKEN_KEY);
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 5000);
  try{
    const res = await fetch(ENDPOINT_PING + '?t=' + Date.now(), {headers, signal: ctrl.signal, cache:'no-store'});
    clearTimeout(t);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return true;
  }catch(e){
    clearTimeout(t);
    return false;
  }
}

async function verificarConexion(){
  if(!navigator.onLine){
    setBadge(estadoLocalActivado() ? 'Local activado (sin conexión)' : 'Desconectado', '#3a1a1a', '#b71c1c');
    btnReconectar.style.display = 'inline-block';
    return false;
  }
  setBadge('En línea (verificando...)', '#163216', '#2e7d32');
  const ok = await ping();
  if(ok){
    retry = 0;
    btnReconectar.style.display = 'none';
    setBadge('Conectado', '#163216', '#2e7d32');
    return true;
  } else {
    setBadge(estadoLocalActivado() ? 'Local activado (backend caído)' : 'Sin backend', '#3a1a1a', '#b71c1c');
    btnReconectar.style.display = 'inline-block';
    return false;
  }
}

function programarReintento(){
  if(retryTimer) clearTimeout(retryTimer);
  const delay = Math.min(30000, 1000 * Math.pow(2, Math.min(5, retry))); // exponencial hasta 30s
  retry += 1;
  retryTimer = setTimeout(() => { verificarConexion(); }, delay);
}

btnReconectar.addEventListener('click', async () => {
  setBadge('Intentando reconectar...', '#2a2a1a', '#c8a84b');
  const ok = await verificarConexion();
  if(!ok) programarReintento();
});

window.addEventListener('online', () => { verificarConexion(); });
window.addEventListener('offline', () => {
  setBadge(estadoLocalActivado() ? 'Local activado (sin conexión)' : 'Desconectado', '#3a1a1a', '#b71c1c');
  btnReconectar.style.display = 'inline-block';
});

document.addEventListener('visibilitychange', () => {
  if(!document.hidden) verificarConexion();
});

// Ejecutar al cargar
actualizarBadgeInicial();
verificarConexion().then(ok => { if(!ok) programarReintento(); });

/* ======== MODAL ======== */
function abrirModal(){
  const modal = document.getElementById("modal");
  const input = document.getElementById("token");
  input.value = localStorage.getItem(LS_TOKEN_KEY) || '';
  modal.style.display = "flex";
}
function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}
function guardar(){
  const t = document.getElementById("token").value.trim();
  if(t){
    localStorage.setItem(LS_TOKEN_KEY, t);
    alert("Token guardado (local)");
  } else {
    localStorage.removeItem(LS_TOKEN_KEY);
    alert("Token eliminado");
  }
  cerrarModal();
  verificarConexion();
}

/* ======== NAV ======== */
function mostrar(id, btn){
  document.querySelectorAll("main section").forEach(s => s.style.display="none");
  document.getElementById(id).style.display="block";
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("act"));
  btn.classList.add("act");
}
</script>
</body>
</html>
